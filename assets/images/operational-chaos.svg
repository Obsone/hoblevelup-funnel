<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="760" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Manual operations chaos visual</title>
  <desc id="desc">Scattered sticky notes, missed calls, unanswered emails, and loose follow-up tasks showing a chaotic manual sales process.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f3ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0066ff"/>
      <stop offset="1" stop-color="#0050cb"/>
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff6f4"/>
      <stop offset="1" stop-color="#ffdad6"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="760" rx="42" fill="#faf8ff"/>
  <circle cx="148" cy="126" r="176" fill="#ffdad6" opacity=".28"/>
  <circle cx="850" cy="612" r="205" fill="#dae1ff" opacity=".48"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="rotate(-8 188 178)">
      <rect x="76" y="96" width="224" height="164" rx="28" fill="#001849" opacity=".08"/>
      <rect x="66" y="84" width="224" height="164" rx="28" fill="url(#note)" stroke="#ffb59d"/>
      <text x="96" y="128" font-size="14" font-weight="800" letter-spacing="1.3" fill="#93000a">STICKY NOTE</text>
      <text x="96" y="172" font-size="26" font-weight="800" fill="#191b24">Call Maya</text>
      <text x="96" y="206" font-size="17" fill="#424656">No time written</text>
      <path d="M96 224h118" stroke="#ba1a1a" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="rotate(5 518 140)">
      <rect x="350" y="82" width="304" height="126" rx="28" fill="#001849" opacity=".08"/>
      <rect x="338" y="70" width="304" height="126" rx="28" fill="#ffffff" stroke="#ffdad6"/>
      <circle cx="390" cy="133" r="28" fill="#ffdad6"/>
      <path d="M380 123c9 22 23 34 45 43" fill="none" stroke="#ba1a1a" stroke-width="6" stroke-linecap="round"/>
      <text x="444" y="120" font-size="24" font-weight="800" fill="#191b24">Missed call</text>
      <text x="444" y="152" font-size="17" fill="#424656">No callback owner</text>
      <text x="556" y="186" font-size="15" font-weight="800" fill="#ba1a1a">2h late</text>
    </g>

    <g transform="rotate(-3 784 232)">
      <rect x="690" y="152" width="260" height="148" rx="28" fill="#001849" opacity=".08"/>
      <rect x="680" y="140" width="260" height="148" rx="28" fill="url(#paper)" stroke="#dae1ff"/>
      <rect x="714" y="176" width="44" height="32" rx="6" fill="none" stroke="#0050cb" stroke-width="5"/>
      <path d="M714 178l22 18 22-18" fill="none" stroke="#0050cb" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="782" y="188" font-size="22" font-weight="800" fill="#191b24">Email inquiry</text>
      <text x="782" y="220" font-size="16" fill="#424656">Unread in inbox</text>
      <rect x="782" y="240" width="98" height="30" rx="15" fill="#ffdad6"/>
      <text x="804" y="261" font-size="13" font-weight="800" fill="#93000a">UNANSWERED</text>
    </g>

    <g transform="rotate(7 260 392)">
      <rect x="112" y="318" width="296" height="148" rx="28" fill="#001849" opacity=".08"/>
      <rect x="100" y="306" width="296" height="148" rx="28" fill="#ffffff" stroke="#ffdad6"/>
      <path d="M138 350h118a20 20 0 0 1 20 20v24a20 20 0 0 1-20 20h-64l-42 34v-34h-12a20 20 0 0 1-20-20v-24a20 20 0 0 1 20-20z" fill="#fff6f4" stroke="#ba1a1a" stroke-width="4"/>
      <text x="300" y="366" font-size="20" font-weight="800" fill="#191b24">DM lead</text>
      <text x="300" y="396" font-size="16" fill="#424656">Lost in chat</text>
      <text x="300" y="426" font-size="15" font-weight="800" fill="#ba1a1a">No next step</text>
    </g>

    <g transform="rotate(-10 600 404)">
      <rect x="462" y="322" width="276" height="164" rx="18" fill="#001849" opacity=".08"/>
      <rect x="450" y="310" width="276" height="164" rx="18" fill="#ffffff" stroke="#c2c6d8"/>
      <text x="482" y="352" font-size="14" font-weight="800" letter-spacing="1.4" fill="#727687">SCRATCH PAD</text>
      <text x="482" y="396" font-size="23" font-weight="800" fill="#191b24">Follow up Friday?</text>
      <text x="482" y="432" font-size="17" fill="#424656">Which lead was this?</text>
      <path d="M482 450c42-26 88-23 132-8s68 10 86-12" fill="none" stroke="#ba1a1a" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="rotate(4 812 470)">
      <rect x="710" y="416" width="250" height="154" rx="28" fill="#001849" opacity=".08"/>
      <rect x="698" y="404" width="250" height="154" rx="28" fill="url(#note)" stroke="#ffb59d"/>
      <text x="732" y="448" font-size="14" font-weight="800" letter-spacing="1.3" fill="#93000a">REMINDER</text>
      <text x="732" y="490" font-size="25" font-weight="800" fill="#191b24">Send quote</text>
      <text x="732" y="524" font-size="17" fill="#424656">Still not sent</text>
      <circle cx="906" cy="452" r="18" fill="#ba1a1a"/>
      <path d="M898 452h16" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    </g>

    <g transform="rotate(-5 300 606)">
      <rect x="110" y="548" width="380" height="98" rx="28" fill="#001849" opacity=".08"/>
      <rect x="96" y="536" width="380" height="98" rx="28" fill="#ffffff" stroke="#dae1ff"/>
      <text x="132" y="578" font-size="15" font-weight="800" letter-spacing="1.4" fill="#727687">PIPELINE STATUS</text>
      <text x="132" y="614" font-size="28" font-weight="800" fill="#191b24">Unknown</text>
      <rect x="300" y="586" width="122" height="28" rx="14" fill="#ffdad6"/>
      <text x="324" y="606" font-size="13" font-weight="800" fill="#93000a">NO OWNER</text>
    </g>

    <g transform="rotate(7 668 622)">
      <rect x="532" y="560" width="272" height="124" rx="28" fill="#001849" opacity=".08"/>
      <rect x="520" y="548" width="272" height="124" rx="28" fill="#ffffff" stroke="#ffdad6"/>
      <text x="554" y="590" font-size="15" font-weight="800" letter-spacing="1.4" fill="#727687">MANUAL WORK</text>
      <text x="554" y="628" font-size="25" font-weight="800" fill="#191b24">Tasks everywhere</text>
      <text x="554" y="656" font-size="16" fill="#424656">Nothing connected</text>
    </g>

    <path d="M322 226c76 42 106 94 96 164M486 188c-54 62-74 108-62 166M724 292c-50 48-72 98-66 150M480 586c42-42 82-72 122-92" fill="none" stroke="#ba1a1a" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 14" opacity=".55"/>
  </g>
</svg>
