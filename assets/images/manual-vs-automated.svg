<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Manual follow-up versus automated sales system</title>
  <desc id="desc">Two premium comparison cards: the faded old manual way and the active Hoblevelup automated sales system.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#faf8ff"/>
      <stop offset=".55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecedfa"/>
    </linearGradient>
    <linearGradient id="smartCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0b1c30"/>
      <stop offset="1" stop-color="#001849"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0066ff"/>
      <stop offset="1" stop-color="#0050cb"/>
    </linearGradient>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#b3c5ff" opacity=".45"/>
    </pattern>
  </defs>

  <rect width="1200" height="620" fill="url(#page)"/>
  <circle cx="210" cy="110" r="180" fill="#dae1ff" opacity=".38"/>
  <circle cx="990" cy="500" r="220" fill="#d0e1fb" opacity=".42"/>

  <g font-family="Inter, Arial, sans-serif">
    <!-- Old way card -->
    <g opacity=".58">
      <rect x="132" y="92" width="440" height="472" rx="28" fill="#001849" opacity=".08"/>
      <rect x="118" y="74" width="440" height="472" rx="28" fill="#ffffff" stroke="#c2c6d8" stroke-dasharray="4 5"/>
      <circle cx="528" cy="102" r="18" fill="#f2f3ff"/>
      <circle cx="528" cy="102" r="9" fill="#c2c6d8"/>
      <rect x="148" y="116" width="166" height="28" rx="14" fill="#727687"/>
      <text x="162" y="135" font-size="12" font-weight="600" fill="#ffffff">YOUR MANUAL SYSTEM</text>

      <g transform="translate(218 150)">
        <rect x="60" y="4" width="128" height="244" rx="25" fill="#ffffff" stroke="#727687" stroke-width="5"/>
        <circle cx="104" cy="18" r="5" fill="#c2c6d8"/>
        <rect x="120" y="16" width="36" height="8" rx="4" fill="#c2c6d8"/>
        <rect x="74" y="32" width="100" height="196" rx="14" fill="#f2f3ff"/>

        <g transform="rotate(-7 100 62)">
          <rect x="86" y="46" width="44" height="44" rx="10" fill="#ffffff" stroke="#c2c6d8"/>
          <text x="101" y="77" font-size="30" font-weight="600" fill="#727687">f</text>
        </g>
        <g transform="rotate(8 148 88)">
          <rect x="126" y="66" width="44" height="44" rx="10" fill="#ffffff" stroke="#c2c6d8"/>
          <rect x="137" y="78" width="22" height="22" rx="5" fill="none" stroke="#727687" stroke-width="3"/>
          <circle cx="148" cy="89" r="6" fill="none" stroke="#727687" stroke-width="3"/>
          <circle cx="158" cy="80" r="2" fill="#727687"/>
        </g>
        <g transform="rotate(-5 106 130)">
          <rect x="84" y="108" width="44" height="44" rx="10" fill="#ffffff" stroke="#c2c6d8"/>
          <rect x="94" y="122" width="24" height="18" rx="4" fill="none" stroke="#727687" stroke-width="3"/>
          <path d="M94 123l12 10 12-10" fill="none" stroke="#727687" stroke-width="3"/>
        </g>
        <g transform="rotate(6 150 150)">
          <rect x="128" y="128" width="44" height="44" rx="10" fill="#ffffff" stroke="#c2c6d8"/>
          <path d="M139 142h22M139 152h22M150 136v28" stroke="#727687" stroke-width="2"/>
        </g>
        <g transform="rotate(-8 124 190)">
          <rect x="92" y="174" width="70" height="28" rx="7" fill="#ffffff" stroke="#c2c6d8"/>
          <circle cx="106" cy="188" r="4" fill="#727687"/>
          <text x="116" y="192" font-size="8" font-weight="500" fill="#727687">Missed call</text>
        </g>
      </g>

      <text x="148" y="428" font-size="18" font-weight="600" fill="#727687">Scattered Channels. No Clear Next Step.</text>
      <text x="148" y="458" font-size="15" font-weight="400" fill="#727687">Leads arrive from different places, reminders live</text>
      <text x="148" y="482" font-size="15" font-weight="400" fill="#727687">in your head, and follow-ups happen only when</text>
      <text x="148" y="506" font-size="15" font-weight="400" fill="#727687">you remember to check. Good conversations</text>
      <text x="148" y="530" font-size="15" font-weight="400" fill="#727687">quietly slip through the cracks.</text>
    </g>

    <!-- Smart way card -->
    <g>
      <rect x="658" y="102" width="438" height="456" rx="28" fill="#001849" opacity=".14"/>
      <rect x="642" y="82" width="438" height="456" rx="28" fill="url(#smartCard)" stroke="#003fa4"/>
      <circle cx="1052" cy="102" r="18" fill="#dae1ff" opacity=".12"/>
      <circle cx="1052" cy="102" r="9" fill="#b3c5ff"/>
      <rect x="672" y="124" width="190" height="30" rx="15" fill="#dae1ff"/>
      <text x="692" y="144" font-size="12" font-weight="600" fill="#003fa4">THE HOBLEVELUP SYSTEM</text>

      <g transform="translate(770 178)">
        <rect x="0" y="0" width="180" height="216" rx="22" fill="#020817"/>
        <rect x="0" y="0" width="180" height="216" rx="22" fill="url(#dots)" opacity=".8"/>
        <line x1="90" y1="48" x2="90" y2="176" stroke="#b3c5ff" stroke-width="2" opacity=".45"/>

        <g>
          <rect x="28" y="28" width="124" height="38" rx="9" fill="#ffffff" opacity=".12" stroke="#b3c5ff"/>
          <path d="M38 42h16l-6 9v8l-4 3V51z" fill="none" stroke="#b3c5ff" stroke-width="2"/>
          <text x="62" y="52" font-size="12" font-weight="500" fill="#eff0fd">Capture</text>
        </g>
        <g>
          <rect x="28" y="78" width="124" height="38" rx="9" fill="#ffffff" opacity=".12" stroke="#b3c5ff"/>
          <circle cx="46" cy="97" r="9" fill="none" stroke="#b3c5ff" stroke-width="2"/>
          <path d="M52 103l8 8" stroke="#b3c5ff" stroke-width="2"/>
          <text x="62" y="102" font-size="12" font-weight="500" fill="#eff0fd">Discover</text>
        </g>
        <g>
          <rect x="28" y="128" width="124" height="38" rx="9" fill="#ffffff" opacity=".12" stroke="#b3c5ff"/>
          <path d="M38 140h20a7 7 0 0 1 7 7v8a7 7 0 0 1-7 7h-8l-12 8v-8a7 7 0 0 1-7-7v-8a7 7 0 0 1 7-7z" fill="none" stroke="#b3c5ff" stroke-width="2"/>
          <text x="68" y="152" font-size="12" font-weight="500" fill="#eff0fd">Follow-up</text>
        </g>
        <g>
          <rect x="28" y="178" width="124" height="38" rx="9" fill="#ffffff" opacity=".12" stroke="#b3c5ff"/>
          <path d="M38 200h10l6-14 8 22 6-12h12" fill="none" stroke="#b3c5ff" stroke-width="2"/>
          <text x="66" y="202" font-size="11" font-weight="500" fill="#eff0fd">Systematize</text>
        </g>
      </g>

      <text x="672" y="426" font-size="18" font-weight="600" fill="#ffffff">A Clear Path From Lead To Booked Call</text>
      <text x="672" y="458" font-size="15" font-weight="400" fill="#eff0fd">Leads are captured, qualified, followed up with,</text>
      <text x="672" y="482" font-size="15" font-weight="400" fill="#eff0fd">and moved through a simple system your business</text>
      <text x="672" y="506" font-size="15" font-weight="400" fill="#eff0fd">can rely on every day.</text>
    </g>
  </g>
</svg>
